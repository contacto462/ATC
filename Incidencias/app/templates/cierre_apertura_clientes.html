<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cierre y Apertura de Clientes</title>
  <style>
    :root{
      --bg-1:#07161b;
      --bg-2:#0b2027;
      --bg-3:#12333b;
      --panel:rgba(5,19,25,.92);
      --line:rgba(255,255,255,.12);
      --text:#f3f8fa;
      --muted:#b9cdd4;
      --field:#08141b;
      --field-b:rgba(194,210,218,.24);
      --ok:#34d399;
      --warn:#f59e0b;
      --derco:#f97316;
      --kovacs:#3b82f6;
      --astara:#14b8a6;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      padding:20px 16px 30px;
      color:var(--text);
      font-family:"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 12% 10%,rgba(255,255,255,.05),transparent 20%),
        radial-gradient(circle at 84% 0%,rgba(249,115,22,.12),transparent 22%),
        linear-gradient(150deg,var(--bg-1) 0%,var(--bg-2) 45%,var(--bg-3) 100%);
    }

    .shell{
      max-width:1500px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .head{
      border:1px solid var(--line);
      border-radius:20px;
      background:var(--panel);
      padding:14px 16px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .head-brand{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .head-logo{
      width:108px;
      height:56px;
      object-fit:contain;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.04);
      padding:6px;
      filter:drop-shadow(0 6px 14px rgba(0,0,0,.28));
    }

    h1{margin:0;font-size:1.95rem;line-height:1.1}
    .subtitle{margin:6px 0 0;color:var(--muted)}

    .top-actions{display:flex;gap:8px;flex-wrap:wrap}

    .btn{
      border:1px solid var(--line);
      border-radius:11px;
      background:rgba(255,255,255,.05);
      color:var(--text);
      text-decoration:none;
      padding:9px 12px;
      font-size:.9rem;
      font-weight:700;
      cursor:pointer;
      transition:.18s ease;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-main{
      border:none;
      background:linear-gradient(135deg,#f97316,#fb923c);
      box-shadow:0 10px 18px rgba(249,115,22,.26);
      color:#fff;
    }

    .filters{
      border:1px solid var(--line);
      border-radius:18px;
      background:var(--panel);
      padding:12px;
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:8px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .field label{
      color:var(--muted);
      font-size:.8rem;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.02em;
    }

    input,select{
      width:100%;
      background:var(--field);
      border:1px solid var(--field-b);
      border-radius:10px;
      color:var(--text);
      padding:10px 11px;
      font:inherit;
    }

    .hint{
      grid-column:1/-1;
      border:1px dashed rgba(255,255,255,.2);
      border-radius:11px;
      padding:8px 10px;
      color:var(--muted);
      font-size:.84rem;
      background:rgba(255,255,255,.03);
    }
    .client-boxes{
      grid-column:1/-1;
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:8px;
    }
    .client-box{
      border:1px solid rgba(255,255,255,.18);
      border-radius:12px;
      padding:10px 12px;
      min-height:56px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      background:rgba(255,255,255,.03);
      color:#d9e6eb;
      cursor:pointer;
      font-size:.95rem;
      font-weight:800;
      letter-spacing:.02em;
      transition:.18s ease;
    }
    .client-box:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.06);
      color:#fff;
    }
    .client-box.active{
      border-color:rgba(251,146,60,.75);
      background:linear-gradient(135deg,#f97316,#fb923c);
      color:#fff;
      box-shadow:0 10px 18px rgba(249,115,22,.24);
    }

    .clients{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .client-card{
      border:1px solid var(--line);
      border-radius:18px;
      background:var(--panel);
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .client-card[data-client="derco"]{--client-color:var(--derco)}
    .client-card[data-client="kovacs"]{--client-color:var(--kovacs)}
    .client-card[data-client="astara"]{--client-color:var(--astara)}

    .client-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      flex-wrap:wrap;
    }
    .client-title{
      display:flex;
      align-items:center;
      gap:8px;
      font-weight:800;
      font-size:1.05rem;
    }
    .dot{
      width:11px;
      height:11px;
      border-radius:999px;
      background:var(--client-color);
      box-shadow:0 0 0 4px rgba(255,255,255,.08);
      flex:0 0 11px;
    }
    .client-sub{
      margin:4px 0 0;
      color:var(--muted);
      font-size:.86rem;
    }

    .client-tools{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    .btn-export{
      border:1px solid rgba(255,255,255,.18);
      background:linear-gradient(180deg,#20475d,#173749);
      box-shadow:0 10px 18px rgba(9,33,45,.34);
      color:#f2f8fb;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:12px;
      background:rgba(0,0,0,.16);
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:880px;
    }

    th,td{
      border:1px solid rgba(255,255,255,.08);
      text-align:center;
      vertical-align:middle;
      padding:8px 7px;
      font-size:.87rem;
    }

    th{
      background:linear-gradient(180deg,#2c5d77,#21495f);
      font-weight:800;
      white-space:nowrap;
    }

    td.branch{
      text-align:left;
      font-weight:700;
      min-width:260px;
      background:rgba(255,255,255,.02);
    }

    .time-input{
      width:100%;
      min-width:130px;
      text-align:center;
      font-weight:700;
      letter-spacing:.01em;
    }

    .preview{
      border:1px solid rgba(255,255,255,.2);
      border-radius:12px;
      overflow:auto;
      background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.015));
    }
    .preview-export{
      min-width:980px;
      background:
        radial-gradient(circle at 88% 4%,rgba(255,255,255,.06),transparent 24%),
        linear-gradient(180deg,rgba(255,255,255,.038),rgba(255,255,255,.014));
    }
    .export-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      padding:12px 14px;
      border-bottom:1px solid rgba(255,255,255,.12);
      background:linear-gradient(180deg,#1e3f52,#173246);
    }
    .export-title{
      margin:0;
      font-size:1.02rem;
      font-weight:800;
      letter-spacing:.01em;
    }
    .export-sub{
      margin:3px 0 0;
      color:#d4e3e9;
      font-size:.82rem;
    }
    .preview-head{
      display:grid;
      grid-template-columns:1.2fr .8fr .8fr;
      min-width:980px;
    }

    .preview-head div{
      padding:10px 12px;
      border-right:1px solid rgba(255,255,255,.12);
      border-bottom:1px solid rgba(255,255,255,.12);
      background:linear-gradient(180deg,#2c5d77,#21495f);
      font-weight:800;
      text-align:center;
      white-space:nowrap;
    }
    .preview-head div:last-child{border-right:none}

    .preview-row{
      display:grid;
      grid-template-columns:1.2fr .8fr .8fr;
      min-width:980px;
    }
    .preview-row > div{
      border-right:1px solid rgba(255,255,255,.08);
      border-bottom:1px solid rgba(255,255,255,.08);
      padding:9px 10px;
      text-align:center;
      min-height:40px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .preview-row > div:first-child{
      justify-content:flex-start;
      text-align:left;
      font-weight:700;
      background:rgba(255,255,255,.02);
    }
    .preview-row > div:last-child{border-right:none}
    .preview-row:last-child > div{border-bottom:none}

    .value-na{color:var(--warn);font-weight:800}
    .value-time{color:var(--ok);font-weight:800}
    .value-empty{color:#9eb2ba}

    .export-sheet{
      position:fixed;
      left:-10000px;
      top:0;
      width:1240px;
      color:#f2f8fb;
      padding:16px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.14);
      background:
        radial-gradient(circle at 90% 4%,rgba(255,255,255,.06),transparent 30%),
        linear-gradient(150deg,#071b24 0%,#0c2834 42%,#133949 100%);
      box-shadow:0 24px 50px rgba(0,0,0,.38);
    }
    .export-brand{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:14px;
      margin-bottom:10px;
      padding:4px 2px;
    }
    .export-brand-left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .export-logo{
      width:120px;
      height:56px;
      object-fit:contain;
      border-radius:10px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.18);
      padding:3px 8px;
    }
    .export-company{
      margin:0;
      font-size:.98rem;
      font-weight:800;
      letter-spacing:.01em;
    }
    .export-meta{
      margin:4px 0 0;
      color:#d2e3ea;
      font-size:.82rem;
    }

    @media (max-width: 1250px){
      .filters{grid-template-columns:repeat(2,minmax(0,1fr))}
      .client-boxes{grid-template-columns:repeat(3,minmax(0,1fr))}
    }

    @media (max-width: 760px){
      .filters{grid-template-columns:1fr}
      .client-boxes{grid-template-columns:1fr}
      .head{padding:12px}
      h1{font-size:1.6rem}
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="head">
      <div class="head-brand">
        <img src="/shared-static/img/logo-atc.png" alt="ATC" class="head-logo" />
        <div>
          <h1>Cierre y Apertura de Clientes</h1>
          <p class="subtitle">Panel oficial para control interno y plantilla profesional de envio a cliente (correo/WhatsApp).</p>
        </div>
      </div>
      <div class="top-actions">
        <a class="btn" href="/?form=panelSelector&token={{ token|default('') }}">Volver al panel</a>
        <a class="btn" href="/?form=login&next=cierreAperturaClientes">Cambiar sesion</a>
      </div>
    </section>

    <section class="filters">
      <div class="field">
        <label>Fecha cierre</label>
        <input id="fechaCierre" type="date" />
      </div>
      <div class="field">
        <label>Fecha apertura</label>
        <input id="fechaApertura" type="date" />
      </div>
      <div class="field">
        <label>Accion</label>
        <button class="btn btn-main" type="button" id="btnAplicarFechas">Aplicar fechas a todos</button>
      </div>
      <div class="client-boxes" id="clientBoxes">
        <button type="button" class="client-box" data-client="derco">DERCO</button>
        <button type="button" class="client-box" data-client="kovacs">KOVACS</button>
        <button type="button" class="client-box" data-client="astara">ASTARA</button>
      </div>
      <div class="hint">
        Puedes escribir <b>hora</b> (ej. 19:34), <b>S/A</b> o <b>-</b>. Usa <b>Guardar imagen PNG</b> para generar la plantilla corporativa de envio.
      </div>
    </section>

    <section class="clients" id="clientsContainer"></section>
  </main>

  <script>
    const clientsConfig = [
      {
        id: "derco",
        name: "Derco",
        branches: [
          "Derco Rancagua",
          "Derco Maipu",
        ],
      },
      {
        id: "kovacs",
        name: "Kovacs",
        branches: [
          "Kovacs Santos Ossa",
          "Kovacs Quillota 315 (Nissan Vina)",
          "Kovacs Colon 3129 (Nissan Valpo)",
        ],
      },
      {
        id: "astara",
        name: "Astara",
        branches: [
          "Astara El tranque",
          "Astara Maipu",
          "Astara Irarrazaval",
          "Astara Cantagallo",
          "Astara Casa Matriz",
          "Astara Luxury",
          "Cortijo Guardia",
          "Cortijo Oficina",
          "Cortijo El galpon",
          "Astara Padre Hurtado",
          "Astara Nos",
          "Alarm. taller y oficina",
          "Miguel Ramirez recepcion y taller",
          "Miguel Ramirez sala de ventas",
          "Astara Longitudinal oficina",
          "Astara Longitudinal Taller",
        ],
      },
    ];

    const state = {
      fechaCierre: "",
      fechaApertura: "",
      rows: {},
    };

    function toDisplayDate(value) {
      if (!value) return "--/--/----";
      const parts = value.split("-");
      if (parts.length !== 3) return value;
      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    function normalizeCellValue(value) {
      const txt = String(value || "").trim();
      if (!txt) return "";
      const up = txt.toUpperCase();
      if (up === "S/A" || up === "SA") return "S/A";
      if (up === "-") return "-";
      return txt;
    }

    function valueClass(value) {
      const v = normalizeCellValue(value);
      if (v === "S/A") return "value-na";
      if (/^\d{1,2}:\d{2}$/.test(v)) return "value-time";
      return "value-empty";
    }

    function buildInitialState() {
      clientsConfig.forEach(client => {
        state.rows[client.id] = client.branches.map(branch => ({
          branch,
          cierre: "",
          apertura: "",
        }));
      });
    }

    function renderClientCard(client) {
      const section = document.createElement("section");
      section.className = "client-card";
      section.dataset.client = client.id;
      section.id = `client-${client.id}`;

      section.innerHTML = `
        <div class="client-head">
          <div>
            <div class="client-title">
              <span class="dot"></span>
              <span>${client.name.toUpperCase()}</span>
            </div>
            <p class="client-sub">Registro interno + plantilla de envio para cliente y grupo de encargados.</p>
          </div>
          <div class="client-tools">
            <button type="button" class="btn btn-export" onclick="guardarImagenCliente('${client.id}')">Guardar imagen PNG</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Sucursal</th>
                <th>Cierre</th>
                <th>Apertura</th>
              </tr>
            </thead>
            <tbody id="edit-${client.id}"></tbody>
          </table>
        </div>

      `;

      return section;
    }

    function renderEditRows(clientId) {
      const tbody = document.getElementById(`edit-${clientId}`);
      const rows = state.rows[clientId] || [];
      tbody.innerHTML = "";

      rows.forEach((row, idx) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="branch">${row.branch}</td>
          <td><input class="time-input" data-client="${clientId}" data-row="${idx}" data-field="cierre" placeholder="Ej: 19:34 / S/A / -" value="${row.cierre}" /></td>
          <td><input class="time-input" data-client="${clientId}" data-row="${idx}" data-field="apertura" placeholder="Ej: 07:25 / S/A / -" value="${row.apertura}" /></td>
        `;
        tbody.appendChild(tr);
      });
    }

    function renderDateStamps() {}

    function getClientById(clientId) {
      return clientsConfig.find(c => c.id === clientId) || null;
    }

    function buildPreviewRowsHtml(clientId) {
      const rows = state.rows[clientId] || [];
      return rows.map(row => {
        const cierre = normalizeCellValue(row.cierre) || "-";
        const apertura = normalizeCellValue(row.apertura) || "-";
        return `
          <div class="preview-row">
            <div>${row.branch}</div>
            <div class="${valueClass(cierre)}">${cierre}</div>
            <div class="${valueClass(apertura)}">${apertura}</div>
          </div>
        `;
      }).join("");
    }

    function buildExportSheet(clientId) {
      const client = getClientById(clientId);
      if (!client) return null;

      const cierre = toDisplayDate(state.fechaCierre);
      const apertura = toDisplayDate(state.fechaApertura);
      const rowsHtml = buildPreviewRowsHtml(clientId);
      const periodo = (state.fechaCierre || state.fechaApertura) ? `Periodo ${cierre} - ${apertura}` : "Periodo no definido";

      const sheet = document.createElement("section");
      sheet.className = "export-sheet";
      sheet.innerHTML = `
        <div class="export-brand">
          <div class="export-brand-left">
            <img src="/shared-static/img/logo-atc.png" alt="ATC" class="export-logo" />
            <div>
              <p class="export-company">ATC - Alguien Te Cuida</p>
              <p class="export-meta">Reporte de cierre y apertura · ${periodo}</p>
            </div>
          </div>
        </div>
        <div class="preview preview-export">
          <div class="export-header">
            <div>
              <p class="export-title">Reporte de Cierre y Apertura</p>
              <p class="export-sub">${client.name.toUpperCase()} - Control operativo diario</p>
            </div>
          </div>
          <div class="preview-head">
            <div>${client.name.toUpperCase()}</div>
            <div>CIERRE</div>
            <div>APERTURA</div>
          </div>
          <div>${rowsHtml}</div>
        </div>
      `;

      return sheet;
    }

    async function guardarImagenCliente(clientId) {
      const target = buildExportSheet(clientId);
      if (!target) return;
      if (typeof html2canvas !== "function") {
        alert("No se pudo cargar el generador de imagen. Recarga la pagina.");
        return;
      }

      document.body.appendChild(target);
      try {
        await new Promise(resolve => setTimeout(resolve, 80));
        const canvas = await html2canvas(target, {
          backgroundColor: null,
          scale: 2,
          useCORS: true,
          width: target.scrollWidth,
          height: target.scrollHeight,
          scrollX: 0,
          scrollY: 0,
        });
        const link = document.createElement("a");
        const now = new Date();
        const stamp = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, "0")}${String(now.getDate()).padStart(2, "0")}_${String(now.getHours()).padStart(2, "0")}${String(now.getMinutes()).padStart(2, "0")}`;
        link.download = `cierre_apertura_${clientId}_${stamp}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      } catch (err) {
        alert("No se pudo guardar la imagen. Intenta nuevamente.");
      } finally {
        target.remove();
      }
    }

    function renderAll() {
      clientsConfig.forEach(client => {
        renderEditRows(client.id);
      });
      renderDateStamps();
    }

    function filterClients(clientId) {
      const cards = document.querySelectorAll(".client-card");
      cards.forEach(card => {
        const show = clientId === "todos" || card.dataset.client === clientId;
        card.style.display = show ? "" : "none";
      });
    }

    function syncClientBoxes(clientId) {
      document.querySelectorAll(".client-box").forEach(box => {
        box.classList.toggle("active", box.getAttribute("data-client") === clientId);
      });
    }

    function applyClientFilter(clientId) {
      const value = clientId || "";
      filterClients(value);
      syncClientBoxes(value);
    }

    function bindEvents() {
      document.getElementById("clientBoxes").addEventListener("click", (event) => {
        const btn = event.target.closest(".client-box");
        if (!btn) return;
        applyClientFilter(btn.getAttribute("data-client"));
      });

      document.getElementById("btnAplicarFechas").addEventListener("click", () => {
        state.fechaCierre = document.getElementById("fechaCierre").value;
        state.fechaApertura = document.getElementById("fechaApertura").value;
        renderDateStamps();
      });

      document.getElementById("fechaCierre").addEventListener("change", (event) => {
        state.fechaCierre = event.target.value;
        renderDateStamps();
      });

      document.getElementById("fechaApertura").addEventListener("change", (event) => {
        state.fechaApertura = event.target.value;
        renderDateStamps();
      });

      document.getElementById("clientsContainer").addEventListener("input", (event) => {
        const target = event.target;
        if (!target.classList.contains("time-input")) return;
        const clientId = target.getAttribute("data-client");
        const rowIdx = Number(target.getAttribute("data-row"));
        const field = target.getAttribute("data-field");
        const rows = state.rows[clientId] || [];
        const row = rows[rowIdx];
        if (!row || (field !== "cierre" && field !== "apertura")) return;
        row[field] = target.value;
      });
    }

    function init() {
      buildInitialState();
      const container = document.getElementById("clientsContainer");
      clientsConfig.forEach(client => {
        container.appendChild(renderClientCard(client));
      });
      renderAll();
      bindEvents();
      applyClientFilter("");
    }

    window.addEventListener("load", init);
  </script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</body>
</html>
