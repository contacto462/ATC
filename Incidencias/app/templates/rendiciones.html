<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rendiciones</title>
  <style>
    :root {
      --bg-1: #09181c;
      --bg-2: #10262d;
      --bg-3: #163840;
      --panel-bg: rgba(9, 22, 26, 0.94);
      --panel-border: rgba(255, 255, 255, 0.10);
      --text-main: #f4f8f9;
      --text-soft: #b9cbd1;
      --cell-bg: rgba(8, 18, 22, 0.96);
      --cell-alt: rgba(12, 27, 32, 0.96);
      --cell-border: rgba(188, 207, 214, 0.10);
      --orange-1: #ff6e23;
      --orange-2: #ff8b33;
      --orange-3: #e85d14;
      --shadow: 0 22px 50px rgba(0, 0, 0, 0.24);
    }

    html, body { min-height: 100%; }

    body {
      font-family: "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
      padding: 34px 36px 44px;
      color: var(--text-main);
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.05), transparent 24%),
        radial-gradient(circle at 82% 12%, rgba(255, 125, 53, 0.08), transparent 18%),
        linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 42%, var(--bg-3) 100%);
      background-attachment: fixed;
    }

    .encabezado-principal {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 18px;
      max-width: 1320px;
      margin: 0 auto 22px;
      padding: 18px 22px;
      border-radius: 26px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
    }

    .marca-principal {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .logo-principal {
      height: 72px;
      width: auto;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .titulo-central {
      margin: 0;
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text-main);
    }

    .subtitulo {
      margin: 4px 0 0;
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.5;
    }

    .sesion-panel {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    #sesionInfo {
      font-weight: 700;
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      padding: 8px 14px;
    }

    .toolbar-panel,
    .tabla-shell {
      max-width: 1320px;
      margin: 0 auto 22px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .toolbar-panel {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 18px;
      flex-wrap: wrap;
    }

    .toolbar-left {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-soft);
      font-size: 14px;
      font-weight: 700;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      height: 30px;
      border-radius: 999px;
      padding: 0 10px;
      background: rgba(255, 139, 51, 0.22);
      border: 1px solid rgba(255, 139, 51, 0.45);
      color: #ffe2c8;
      font-weight: 800;
      font-size: 13px;
    }

    .toolbar-actions {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tabla-shell { padding: 14px; }
    .tabla-scroll { overflow-x: auto; border-radius: 18px; }

    table {
      width: 100%;
      min-width: 1540px;
      border-collapse: collapse;
      table-layout: fixed;
      background: transparent;
      border-radius: 18px;
      overflow: hidden;
      font-size: 14px;
    }

    th, td {
      padding: 11px 10px;
      text-align: center;
      border: 1px solid var(--cell-border);
      vertical-align: middle;
      word-break: break-word;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: linear-gradient(135deg, var(--orange-3) 0%, var(--orange-2) 100%);
      color: white;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    tbody td { background: var(--cell-bg); color: var(--text-main); }
    tbody tr:nth-child(even) td { background: var(--cell-alt); }
    .text-left { text-align: left; }

    a {
      color: #9dd3ff;
      text-decoration: none;
      font-weight: 700;
    }
    a:hover { text-decoration: underline; color: #ffffff; }

    button {
      padding: 10px 16px;
      background: #111b1f;
      color: white;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      transition: transform 0.18s ease, background-color 0.18s ease;
    }

    button:hover {
      background: #1a272c;
      transform: translateY(-1px);
    }

    .btn-primario {
      background: linear-gradient(135deg, var(--orange-1) 0%, var(--orange-2) 100%);
      box-shadow: 0 12px 24px rgba(255, 110, 35, 0.20);
    }

    .btn-primario:hover {
      background: linear-gradient(135deg, #ff7d3a 0%, #ff9a52 100%);
    }

    .btn-secundario {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: none;
    }

    .btn-ok {
      padding: 7px 11px;
      border-radius: 10px;
      background: rgba(52, 211, 153, 0.22);
      color: #d8fff2;
      border: 1px solid rgba(52, 211, 153, 0.45);
      box-shadow: none;
    }

    .btn-no {
      padding: 7px 11px;
      border-radius: 10px;
      background: rgba(239, 68, 68, 0.24);
      color: #ffd8d8;
      border: 1px solid rgba(239, 68, 68, 0.46);
      box-shadow: none;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .estado-cargando,
    .estado-vacio {
      max-width: 1320px;
      margin: 0 auto;
      text-align: center;
      color: var(--text-soft);
      padding: 20px;
      font-weight: 700;
    }

    #toast {
      position: fixed;
      top: 20px;
      right: 20px;
      max-width: 360px;
      z-index: 10000;
      background: #323232;
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 16px 28px rgba(0, 0, 0, 0.28);
      display: none;
      line-height: 1.4;
      font-size: 13px;
    }

    #toast.ok { background: rgba(16, 87, 61, 0.98); border-color: rgba(52, 211, 153, 0.52); }
    #toast.error { background: rgba(103, 26, 26, 0.98); border-color: rgba(239, 68, 68, 0.52); }
  </style>
</head>
<body>
  <div class="encabezado-principal">
    <div class="marca-principal">
      <img src="/shared-static/img/logo-atc.png" alt="Logo ATC" class="logo-principal" />
      <div>
        <h1 class="titulo-central">Rendicion de Gastos</h1>
        <p class="subtitulo">Bandeja de revision y aprobacion de rendiciones pendientes.</p>
      </div>
    </div>
    <div class="sesion-panel">
      <span id="sesionInfo"></span>
      <button type="button" class="btn-secundario" onclick="cerrarSesion()">Cerrar sesion</button>
    </div>
  </div>

  <div class="toolbar-panel">
    <div class="toolbar-left">
      Pendientes
      <span id="contadorPendientes" class="pill">0</span>
    </div>
    <div class="toolbar-actions">
      <button type="button" class="btn-secundario" onclick="volverAPanelServicio()">Volver</button>
      <button type="button" class="btn-primario" onclick="cargarRendiciones()">Actualizar</button>
    </div>
  </div>

  <div id="estadoCarga" class="estado-cargando">Cargando rendiciones...</div>

  <div id="tablaWrapper" class="tabla-shell" style="display:none;">
    <div class="tabla-scroll">
      <table id="tablaRendiciones">
        <thead>
          <tr>
            <th>Folio</th>
            <th>Tipo de Gasto</th>
            <th>Fecha de Documento</th>
            <th>Monto Total</th>
            <th>Documento</th>
            <th>Tecnico</th>
            <th>Cliente</th>
            <th>ODT</th>
            <th>Rendiciones</th>
            <th>Imagen</th>
            <th>Aceptar</th>
            <th>Rechazar</th>
          </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
      </table>
    </div>
  </div>

  <div id="estadoVacio" class="estado-vacio" style="display:none;">No hay registros pendientes.</div>
  <div id="toast"></div>

  <script>
    const tokenPlantilla = {{ token|tojson }};
    let tokenSesion = "";

    function mostrarToast(texto, ok = true) {
      const t = document.getElementById("toast");
      if (!t) return;
      t.className = ok ? "ok" : "error";
      t.textContent = texto;
      t.style.display = "block";
      clearTimeout(mostrarToast._id);
      mostrarToast._id = setTimeout(() => { t.style.display = "none"; }, 2800);
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = String(text || "");
      return div.innerHTML;
    }

    function obtenerTokenActivo() {
      const qp = new URLSearchParams(window.location.search).get("token") || "";
      const ls = localStorage.getItem("atc_token") || "";
      const base = String(tokenPlantilla || "").trim();
      const token = qp || ls || base;
      if (token) localStorage.setItem("atc_token", token);
      return token;
    }

    async function api(url, options = {}) {
      const opts = {
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        ...options,
      };
      const res = await fetch(url, opts);
      const contentType = res.headers.get("content-type") || "";
      const payload = contentType.includes("application/json") ? await res.json() : await res.text();
      if (!res.ok) {
        const detail = typeof payload === "string" ? payload : payload?.detail || JSON.stringify(payload);
        throw new Error(detail || `HTTP ${res.status}`);
      }
      return payload;
    }

    async function validarSesion() {
      tokenSesion = obtenerTokenActivo();
      if (!tokenSesion) {
        window.location.href = "/?form=login&next=rendiciones";
        return false;
      }
      try {
        const data = await api(`/api/usuario-actual?token=${encodeURIComponent(tokenSesion)}`);
        const usuario = String(data?.usuario || "").trim();
        if (!usuario || usuario === "Desconocido") {
          window.location.href = "/?form=login&next=rendiciones";
          return false;
        }
        document.getElementById("sesionInfo").textContent = usuario;
        return true;
      } catch (_) {
        window.location.href = "/?form=login&next=rendiciones";
        return false;
      }
    }

    async function cerrarSesion() {
      try {
        if (tokenSesion) {
          await fetch(`/api/logout?token=${encodeURIComponent(tokenSesion)}`, { method: "POST" });
        }
      } catch (_) {
        // Ignorado: siempre redireccionamos.
      }
      window.location.href = "/?form=login&next=rendiciones";
    }

    function volverAPanelServicio() {
      const q = tokenSesion ? `&token=${encodeURIComponent(tokenSesion)}` : "";
      window.location.href = `/?form=panelSelectorServicio${q}`;
    }

    function montoCLP(valor) {
      const n = Number(valor);
      if (!Number.isFinite(n)) return String(valor || "");
      return n.toLocaleString("es-CL", { style: "currency", currency: "CLP", maximumFractionDigits: 0 });
    }

    function crearEnlaceSeguro(url, texto) {
      const href = String(url || "").trim();
      if (!href) return "";
      return `<a href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer">${escapeHtml(texto)}</a>`;
    }

    function extraerEnlaces(valor, etiqueta, folio) {
      const texto = String(valor || "").trim();
      if (!texto) return "";
      const partes = texto.split(/\r?\n|;/).map((x) => x.trim()).filter(Boolean);
      const enlaces = [];
      partes.forEach((chunk) => {
        const matchFormula = chunk.match(/=HYPER(?:LINK|VINCULO)\(\s*"([^"]+)",\s*"([^"]+)"\s*\)/i);
        if (matchFormula?.[1]) {
          enlaces.push(crearEnlaceSeguro(matchFormula[1], `${etiqueta} ${folio}`));
          return;
        }
        const matchUrl = chunk.match(/(https?:\/\/[^\s")]+)/i);
        if (matchUrl?.[1]) {
          enlaces.push(crearEnlaceSeguro(matchUrl[1], `${etiqueta} ${folio}`));
        }
      });
      return enlaces.filter(Boolean).join("<br>");
    }

    function documentoTexto(row) {
      const doc = String(row?.documento || "").trim();
      if (doc) return doc;
      const tipo = String(row?.tipoDocumento || "").trim();
      const nro = String(row?.nroDocumento || "").trim();
      return [tipo, nro].filter(Boolean).join(" ");
    }

    function setEstadoVista({ cargando = false, mostrarTabla = false, vacio = false }) {
      const estadoCarga = document.getElementById("estadoCarga");
      const tablaWrapper = document.getElementById("tablaWrapper");
      const estadoVacio = document.getElementById("estadoVacio");
      if (estadoCarga) estadoCarga.style.display = cargando ? "block" : "none";
      if (tablaWrapper) tablaWrapper.style.display = mostrarTabla ? "block" : "none";
      if (estadoVacio) estadoVacio.style.display = vacio ? "block" : "none";
    }

    function actualizarContador(total) {
      const el = document.getElementById("contadorPendientes");
      if (el) el.textContent = String(total);
    }

    async function marcarRendicion(folio, accion, btn) {
      const fila = btn?.closest("tr");
      const btnAceptar = fila?.querySelector(".btn-ok");
      const btnRechazar = fila?.querySelector(".btn-no");
      if (!fila || !btnAceptar || !btnRechazar) return;

      btnAceptar.disabled = true;
      btnRechazar.disabled = true;
      try {
        await api(`/api/rendiciones/${encodeURIComponent(folio)}?accion=${encodeURIComponent(accion)}`, {
          method: "PATCH"
        });
        fila.remove();
        const restantes = document.querySelectorAll("#tablaBody tr").length;
        actualizarContador(restantes);
        if (!restantes) {
          setEstadoVista({ cargando: false, mostrarTabla: false, vacio: true });
        }
        mostrarToast(
          accion === "aceptar"
            ? `Rendicion ${folio} aceptada.`
            : `Rendicion ${folio} rechazada.`,
          true
        );
      } catch (err) {
        btnAceptar.disabled = false;
        btnRechazar.disabled = false;
        mostrarToast(`No se pudo actualizar folio ${folio}: ${err.message}`, false);
      }
    }

    function renderTabla(rows) {
      const tbody = document.getElementById("tablaBody");
      if (!tbody) return;
      tbody.innerHTML = "";

      const pendientes = Array.isArray(rows) ? rows : [];
      actualizarContador(pendientes.length);

      if (!pendientes.length) {
        setEstadoVista({ cargando: false, mostrarTabla: false, vacio: true });
        return;
      }

      const fragment = document.createDocumentFragment();
      pendientes.forEach((row) => {
        const folio = row?.folio ?? "";
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(folio)}</td>
          <td>${escapeHtml(row?.tipoGasto || "")}</td>
          <td>${escapeHtml(row?.fechaDocumento || "")}</td>
          <td>${escapeHtml(montoCLP(row?.montoTotal))}</td>
          <td>${escapeHtml(documentoTexto(row))}</td>
          <td>${escapeHtml(row?.tecnico || "")}</td>
          <td class="text-left">${escapeHtml(row?.cliente || "")}</td>
          <td>${escapeHtml(row?.odt || "")}</td>
          <td>${extraerEnlaces(row?.urlInforme, "Rendicion", folio)}</td>
          <td>${extraerEnlaces(row?.urlBoleta, "Imagen", folio)}</td>
          <td><button type="button" class="btn-ok">Aceptar</button></td>
          <td><button type="button" class="btn-no">Rechazar</button></td>
        `;
        const btnAceptar = tr.querySelector(".btn-ok");
        const btnRechazar = tr.querySelector(".btn-no");
        btnAceptar?.addEventListener("click", () => marcarRendicion(folio, "aceptar", btnAceptar));
        btnRechazar?.addEventListener("click", () => marcarRendicion(folio, "rechazar", btnRechazar));
        fragment.appendChild(tr);
      });
      tbody.appendChild(fragment);
      setEstadoVista({ cargando: false, mostrarTabla: true, vacio: false });
    }

    async function cargarRendiciones() {
      setEstadoVista({ cargando: true, mostrarTabla: false, vacio: false });
      const estadoVacio = document.getElementById("estadoVacio");
      if (estadoVacio) estadoVacio.textContent = "No hay registros pendientes.";
      try {
        const data = await api("/api/rendiciones?pendientes=true");
        renderTabla(Array.isArray(data) ? data : []);
      } catch (err) {
        setEstadoVista({ cargando: false, mostrarTabla: false, vacio: true });
        if (estadoVacio) estadoVacio.textContent = "Error cargando rendiciones.";
        mostrarToast(`Error: ${err.message}`, false);
      }
    }

    window.addEventListener("load", async () => {
      const ok = await validarSesion();
      if (!ok) return;
      await cargarRendiciones();
    });
  </script>
</body>
</html>
