<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iniciar Sesión</title>
  <style>
    :root {
      --bg-1: #0a1c20;
      --bg-2: #10272d;
      --bg-3: #17363d;
      --panel-border: rgba(255, 255, 255, 0.10);
      --text-main: #f4f8f9;
      --text-soft: #c0cfd4;
      --field-bg: #091217;
      --field-border: rgba(194, 210, 218, 0.22);
      --field-focus: rgba(255, 117, 35, 0.65);
      --button-start: #ff6e23;
      --button-end: #ff8b33;
      --button-text: #ffffff;
      --shadow-main: rgba(0, 0, 0, 0.32);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 18% 22%, rgba(255, 255, 255, 0.05), transparent 24%),
        radial-gradient(circle at 78% 12%, rgba(255, 125, 53, 0.08), transparent 18%),
        linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 42%, var(--bg-3) 100%);
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent 82%);
    }

    body::after {
      background:
        radial-gradient(circle at 30% 65%, rgba(255, 255, 255, 0.03), transparent 28%),
        radial-gradient(circle at 76% 78%, rgba(255, 122, 43, 0.10), transparent 18%);
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
      position: relative;
      z-index: 1;
    }

    .card {
      width: 100%;
      max-width: 520px;
      padding: 28px 28px 26px;
      border-radius: 28px;
      background: rgba(9, 22, 26, 0.96);
      border: 1px solid var(--panel-border);
      box-shadow:
        0 30px 70px var(--shadow-main),
        inset 0 1px 0 rgba(255,255,255,0.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .head {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 18px;
    }

    .logo-shell {
      width: 118px;
      min-width: 118px;
      height: 90px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .logo-shell img {
      width: 100%;
      max-width: 114px;
      height: auto;
      display: block;
      object-fit: contain;
      border-radius: 12px;
    }

    .title-wrap {
      flex: 1;
      min-width: 0;
    }

    h2 {
      margin: 0;
      font-size: 2.05rem;
      line-height: 1.02;
      letter-spacing: -0.035em;
      font-weight: 800;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      margin-top: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.10);
      color: var(--text-soft);
      font-size: 0.92rem;
      letter-spacing: 0.01em;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    label {
      display: block;
      margin: 0 0 8px;
      font-size: 0.96rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #ffffff;
    }

    input, button {
      width: 100%;
      border-radius: 18px;
      font-size: 1rem;
      font-family: inherit;
    }

    input {
      border: 1px solid var(--field-border);
      background: var(--field-bg);
      color: var(--text-main);
      padding: 15px 16px;
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease;
    }

    input::placeholder { color: #94a6ad; }

    input:focus {
      border-color: var(--field-focus);
      box-shadow: 0 0 0 4px rgba(255, 110, 35, 0.12);
      transform: translateY(-1px);
    }

    button {
      margin-top: 6px;
      padding: 15px 18px;
      border: none;
      color: var(--button-text);
      background: linear-gradient(135deg, var(--button-start) 0%, var(--button-end) 100%);
      font-weight: 800;
      letter-spacing: 0.01em;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(255, 110, 35, 0.25);
      transition: transform .18s ease, filter .18s ease, box-shadow .18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
      box-shadow: 0 16px 30px rgba(255, 110, 35, 0.32);
    }

    button:disabled {
      opacity: .72;
      cursor: wait;
      transform: none;
      filter: none;
    }

    .msg {
      min-height: 22px;
      margin-top: 12px;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .ok { color: #59d48a; }
    .err { color: #ff8787; }

    @media (max-width: 640px) {
      .card {
        padding: 22px 18px 20px;
        border-radius: 24px;
      }

      .head {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .logo-shell {
        width: 108px;
        min-width: 108px;
        height: 82px;
      }

      h2 { font-size: 1.78rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <div class="logo-shell">
          <img src="/shared-static/img/logo-atc.png" alt="Logo ATC" />
        </div>
        <div class="title-wrap">
          <h2>Iniciar Sesión</h2>
          <div class="badge" id="modoBadge">Acceso</div>
        </div>
      </div>

      <div class="form-grid">
        <div>
          <label for="nombreTecnico">Técnico</label>
          <input id="nombreTecnico" list="listaTecnicosLogin" type="text" autocomplete="username" placeholder="Nombre y Apellido Completo" />
          <datalist id="listaTecnicosLogin"></datalist>
        </div>

        <div>
          <label for="claveTecnico">Clave</label>
          <input id="claveTecnico" type="password" autocomplete="current-password" placeholder="******" />
        </div>

        <button type="button" id="btnLogin">Entrar</button>
      </div>

      <div id="msg" class="msg"></div>
    </div>
  </div>

  <script>
    const nextForm = {{ next_form|default("tecnicos")|tojson }};

    function setMsg(texto, ok) {
      const el = document.getElementById("msg");
      el.textContent = texto || "";
      el.className = `msg ${ok ? "ok" : "err"}`;
    }

    function generarToken() {
      if (window.crypto?.randomUUID) return crypto.randomUUID();
      return `tok_${Date.now()}_${Math.random().toString(36).slice(2)}`;
    }

    function aplicarContextoLogin() {
      const badge = document.getElementById("modoBadge");
      if (nextForm === "tecnicos") {
        badge.textContent = "Acceso a tabla técnicos";
      } else if (["coordinacion", "panelSelectorCoordinacion", "tablaProtocolos", "envioProtocolosSemanales"].includes(nextForm)) {
        badge.textContent = "Acceso Coordinación";
      } else if (["incidencias", "panelSelector", "cierreAperturaClientes", "controlProtocolos"].includes(nextForm)) {
        badge.textContent = "Acceso Encargados";
      } else {
        badge.textContent = "Acceso a Servicio Técnico";
      }
    }

    async function login() {
      const nombre = document.getElementById("nombreTecnico").value.trim();
      const clave = document.getElementById("claveTecnico").value;

      if (!nombre || !clave) {
        setMsg("Completa técnico y clave.", false);
        return;
      }

      const token = generarToken();
      const btn = document.getElementById("btnLogin");
      btn.disabled = true;
      btn.textContent = "Ingresando...";
      setMsg("", true);

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            nombre_tecnico: nombre,
            clave,
            token,
            destino: nextForm,
          }),
        });

        const payload = await res.json();
        if (!res.ok || !payload?.success) {
          throw new Error(payload?.message || payload?.detail || "Credenciales inválidas");
        }

        localStorage.setItem("atc_token", token);
        setMsg("Ingreso correcto. Redirigiendo...", true);
        window.location.href = payload.redirect;
      } catch (err) {
        setMsg(err.message || "No se pudo iniciar sesión", false);
        btn.disabled = false;
        btn.textContent = "Entrar";
      }
    }

    async function cargarTecnicosLogin() {
      try {
        const res = await fetch(`/api/login/usuarios?destino=${encodeURIComponent(nextForm)}`);
        const data = await res.json();
        const lista = Array.isArray(data?.usuarios) ? data.usuarios : [];
        const dl = document.getElementById("listaTecnicosLogin");
        dl.innerHTML = "";
        lista.forEach((n) => {
          const o = document.createElement("option");
          o.value = n;
          dl.appendChild(o);
        });
      } catch (_) {
        // Si falla, se puede escribir manualmente.
      }
    }

    aplicarContextoLogin();
    cargarTecnicosLogin();

    document.getElementById("btnLogin").addEventListener("click", login);
    document.getElementById("claveTecnico").addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
