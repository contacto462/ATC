<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Formulario Rendicion</title>
  <style>
    :root {
      --bg-1: #09181c;
      --bg-2: #10262d;
      --bg-3: #163840;
      --panel-bg: rgba(9, 22, 26, 0.94);
      --panel-border: rgba(255, 255, 255, 0.10);
      --text-main: #f4f8f9;
      --text-soft: #b9cbd1;
      --field-bg: #091217;
      --field-border: rgba(194, 210, 218, 0.20);
      --orange-1: #ff6e23;
      --orange-2: #ff8b33;
      --orange-3: #e85d14;
      --danger: #ef4444;
      --success: #34d399;
      --shadow: 0 22px 50px rgba(0, 0, 0, 0.24);
    }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
      padding: 32px 16px 42px;
      color: var(--text-main);
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.05), transparent 24%),
        radial-gradient(circle at 82% 12%, rgba(255, 125, 53, 0.08), transparent 18%),
        linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 42%, var(--bg-3) 100%);
      background-attachment: fixed;
    }

    .contenedor {
      max-width: 760px;
      margin: 0 auto;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .logo {
      width: 120px;
      max-width: 100%;
      height: auto;
      object-fit: contain;
    }

    h2 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.02em;
      color: var(--text-main);
      font-weight: 800;
    }

    .subtitulo {
      width: 100%;
      margin: 0;
      color: var(--text-soft);
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-main);
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid var(--field-border);
      border-radius: 12px;
      box-sizing: border-box;
      color: #fff;
      background: var(--field-bg);
      font-family: "Segoe UI", sans-serif;
    }

    textarea {
      resize: vertical;
      min-height: 92px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: rgba(255, 139, 51, 0.54);
      box-shadow: 0 0 0 3px rgba(255, 110, 35, 0.12);
    }

    select {
      color-scheme: dark;
    }

    input[readonly],
    select:disabled {
      opacity: 0.85;
      cursor: not-allowed;
      background: rgba(255, 255, 255, 0.08);
    }

    .help {
      font-size: 12px;
      color: var(--text-soft);
      display: none;
    }

    .acciones {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 14px;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      transition: transform 0.18s ease, background-color 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .btn-secundario {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .btn-primario {
      background: linear-gradient(135deg, var(--orange-1) 0%, var(--orange-2) 100%);
      box-shadow: 0 12px 24px rgba(255, 110, 35, 0.20);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .alerta {
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      border: 1px solid transparent;
      display: none;
      line-height: 1.4;
    }

    .alerta.error {
      background: rgba(103, 26, 26, 0.98);
      border-color: rgba(239, 68, 68, 0.52);
      color: #ffd8d8;
    }

    .alerta.ok {
      background: rgba(16, 87, 61, 0.98);
      border-color: rgba(52, 211, 153, 0.52);
      color: #d8fff2;
    }

    .resumen {
      display: none;
      margin-top: 20px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(52, 211, 153, 0.10);
      border: 1px solid rgba(52, 211, 153, 0.35);
    }

    .resumen h3 {
      margin: 0 0 10px;
      color: #d7fff0;
      font-size: 18px;
    }

    .resumen p {
      margin: 6px 0;
      color: var(--text-main);
      word-break: break-word;
    }

    @media (max-width: 720px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      h2 {
        font-size: 26px;
      }

      .contenedor {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <div class="header">
      <img src="/shared-static/img/logo-atc.png" class="logo" alt="ATC" />
      <h2>Formulario Rendicion</h2>
      <p class="subtitulo">Registro de gastos con validacion de documento y respaldo de boleta.</p>
    </div>

    <div class="toolbar">
      <button type="button" class="btn-secundario" onclick="volverATecnicos()">Volver</button>
    </div>

    <div id="mensajeError" class="alerta error"></div>
    <div id="mensajeOk" class="alerta ok"></div>

    <form id="gastoForm" novalidate>
      <div class="form-grid">
        <div class="form-group">
          <label for="tecnico">Tecnico</label>
          <input type="text" id="tecnico" name="tecnico" readonly />
        </div>

        <div class="form-group">
          <label for="odt">ODT</label>
          <input type="text" id="odt" name="odt" readonly />
        </div>

        <div class="form-group full">
          <label for="cliente">Cliente</label>
          <input type="text" id="cliente" name="cliente" readonly />
        </div>

        <div class="form-group">
          <label for="tipoGasto">Tipo de Gasto</label>
          <select id="tipoGasto" name="tipoGasto" required>
            <option value="">Elegir</option>
            <option>Viatico</option>
            <option>Peaje</option>
            <option>Estacionamiento</option>
            <option>Materiales</option>
            <option>Hospedaje</option>
            <option>Combustible</option>
            <option>Pasaje</option>
          </select>
        </div>

        <div class="form-group">
          <label for="tipoDocumento">Tipo de Documento</label>
          <select id="tipoDocumento" name="tipoDocumento" required>
            <option value="">Elegir</option>
          </select>
        </div>

        <div class="form-group">
          <label for="fechaDocumento">Fecha de Documento</label>
          <input type="date" id="fechaDocumento" name="fechaDocumento" required />
        </div>

        <div class="form-group">
          <label for="nroDocumento">Nro de Documento</label>
          <input type="text" id="nroDocumento" name="nroDocumento" required />
          <small id="msgNroAuto" class="help">Para peaje se genera automatico al seleccionar fecha y hora.</small>
        </div>

        <div class="form-group">
          <label for="montoTotal">Monto Total</label>
          <input type="number" step="0.01" id="montoTotal" name="montoTotal" required />
        </div>

        <div class="form-group full">
          <label for="descripcion">Descripcion</label>
          <textarea id="descripcion" name="descripcion" placeholder="Detalle opcional..."></textarea>
        </div>

        <div class="form-group full">
          <label for="boleta">Imagen del Documento</label>
          <input type="file" id="boleta" name="boleta" accept="image/*" required />
        </div>
      </div>

      <div class="acciones">
        <button type="submit" id="btnEnviar" class="btn-primario">Enviar</button>
      </div>
    </form>

    <div id="resumenEnviado" class="resumen">
      <h3>Gasto registrado exitosamente</h3>
      <div id="detalleEnviado"></div>
    </div>
  </div>

  <script>
    const tecnicoPlantilla = {{ tecnico|tojson }};
    const odtPlantilla = {{ odt|tojson }};
    const clientePlantilla = {{ cliente|tojson }};
    const tokenPlantilla = {{ token|tojson }};

    let envioRealizado = false;
    let fechaDocumento = null;

    const tipoGasto = document.getElementById("tipoGasto");
    const tipoDocumento = document.getElementById("tipoDocumento");
    const nroDocumento = document.getElementById("nroDocumento");
    const msgNroAuto = document.getElementById("msgNroAuto");

    const opcionesPorGasto = {
      Viatico: ["Boleta"],
      Peaje: ["Vale Peaje"],
      Estacionamiento: ["Boleta"],
      Materiales: ["Boleta", "Factura Electronica"],
      Hospedaje: ["Boleta", "Factura Electronica"],
      Combustible: ["Boleta", "Factura Electronica"],
      Pasaje: ["Boleta", "Factura Electronica", "Vale Peaje"]
    };

    function qParam(name) {
      return new URLSearchParams(window.location.search).get(name) || "";
    }

    function setError(msg) {
      const boxErr = document.getElementById("mensajeError");
      const boxOk = document.getElementById("mensajeOk");
      if (boxOk) {
        boxOk.style.display = "none";
        boxOk.textContent = "";
      }
      if (boxErr) {
        boxErr.textContent = msg || "";
        boxErr.style.display = msg ? "block" : "none";
      }
    }

    function setOk(msg) {
      const boxErr = document.getElementById("mensajeError");
      const boxOk = document.getElementById("mensajeOk");
      if (boxErr) {
        boxErr.style.display = "none";
        boxErr.textContent = "";
      }
      if (boxOk) {
        boxOk.textContent = msg || "";
        boxOk.style.display = msg ? "block" : "none";
      }
    }

    function obtenerTokenActivo() {
      const qp = qParam("token");
      const ls = localStorage.getItem("atc_token") || "";
      const base = String(tokenPlantilla || "").trim();
      const token = qp || ls || base;
      if (token) localStorage.setItem("atc_token", token);
      return token;
    }

    async function api(url, options = {}) {
      const opts = {
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        ...options,
      };
      const res = await fetch(url, opts);
      const contentType = res.headers.get("content-type") || "";
      const payload = contentType.includes("application/json") ? await res.json() : await res.text();
      if (!res.ok) {
        const detail = typeof payload === "string" ? payload : payload?.detail || JSON.stringify(payload);
        throw new Error(detail || `HTTP ${res.status}`);
      }
      return payload;
    }

    async function validarSesionActiva() {
      const token = obtenerTokenActivo();
      if (!token) {
        window.location.href = "/?form=login&next=formularioViatico";
        return false;
      }
      try {
        const data = await api(`/api/usuario-actual?token=${encodeURIComponent(token)}`);
        const usuario = String(data?.usuario || "").trim();
        if (!usuario || usuario === "Desconocido") {
          window.location.href = "/?form=login&next=formularioViatico";
          return false;
        }
        return true;
      } catch (_) {
        window.location.href = "/?form=login&next=formularioViatico";
        return false;
      }
    }

    function volverATecnicos() {
      const token = obtenerTokenActivo();
      const q = token ? `&token=${encodeURIComponent(token)}` : "";
      window.location.href = `/?form=tecnicos${q}`;
    }

    function bloquearFormulario() {
      const form = document.getElementById("gastoForm");
      const boton = document.getElementById("btnEnviar");
      boton.disabled = true;
      boton.textContent = "Enviando...";
      form.querySelectorAll("input, select, textarea").forEach((el) => { el.disabled = true; });
      envioRealizado = true;
    }

    function desbloquearFormulario() {
      const form = document.getElementById("gastoForm");
      const boton = document.getElementById("btnEnviar");
      boton.disabled = false;
      boton.textContent = "Enviar";
      form.querySelectorAll("input, select, textarea").forEach((el) => { el.disabled = false; });
      envioRealizado = false;

      const tipo = tipoGasto.value;
      if (tipo === "Peaje") {
        tipoDocumento.disabled = true;
        tipoDocumento.style.backgroundColor = "rgba(255, 255, 255, 0.08)";
      }
    }

    function bindPeajeAutoNumero() {
      if (!fechaDocumento) return;
      fechaDocumento.addEventListener("change", () => {
        if (tipoGasto.value !== "Peaje") return;
        const f = new Date(fechaDocumento.value);
        if (Number.isNaN(f.getTime())) return;
        const pad = (n) => String(n).padStart(2, "0");
        nroDocumento.value =
          pad(f.getDate()) +
          pad(f.getMonth() + 1) +
          f.getFullYear() +
          pad(f.getHours()) +
          pad(f.getMinutes());
      });
    }

    function actualizarFechaInput(esPeaje) {
      const actual = document.getElementById("fechaDocumento");
      const nuevo = document.createElement("input");
      nuevo.id = "fechaDocumento";
      nuevo.name = "fechaDocumento";
      nuevo.required = true;
      nuevo.type = esPeaje ? "datetime-local" : "date";
      nuevo.value = "";
      nuevo.className = actual.className;
      actual.replaceWith(nuevo);
      fechaDocumento = document.getElementById("fechaDocumento");
      bindPeajeAutoNumero();
    }

    function actualizarTipoDocumento() {
      const tipo = tipoGasto.value;
      const opciones = opcionesPorGasto[tipo] || [];

      tipoDocumento.innerHTML = '<option value="">Elegir</option>' +
        opciones.map((op) => `<option value="${op}">${op}</option>`).join("");

      if (opciones.length === 1) {
        tipoDocumento.innerHTML = `<option value="${opciones[0]}">${opciones[0]}</option>`;
        tipoDocumento.value = opciones[0];
        tipoDocumento.disabled = true;
        tipoDocumento.style.backgroundColor = "rgba(255, 255, 255, 0.08)";
      } else {
        tipoDocumento.disabled = false;
        tipoDocumento.style.backgroundColor = "";
      }

      const esPeaje = tipo === "Peaje";
      nroDocumento.readOnly = esPeaje;
      nroDocumento.value = "";
      msgNroAuto.style.display = esPeaje ? "block" : "none";

      actualizarFechaInput(esPeaje);
    }

    async function verificarDuplicado(nro) {
      const resp = await api(`/api/rendiciones/duplicado?nro_documento=${encodeURIComponent(nro)}`);
      return Boolean(resp?.duplicado);
    }

    async function subirBoleta(archivo, tecnico, odt) {
      const formData = new FormData();
      formData.append("file", archivo, archivo.name);
      formData.append("tecnico", tecnico || "");
      formData.append("odt", odt || "");

      const res = await fetch("/api/rendiciones/upload-boleta", {
        method: "POST",
        body: formData,
      });
      const contentType = res.headers.get("content-type") || "";
      const payload = contentType.includes("application/json") ? await res.json() : await res.text();
      if (!res.ok) {
        const detail = typeof payload === "string" ? payload : payload?.detail || JSON.stringify(payload);
        throw new Error(detail || `HTTP ${res.status}`);
      }
      return String(payload?.url || "").trim();
    }

    function poblarCamposIniciales() {
      const tecnico = qParam("tecnico") || String(tecnicoPlantilla || "").trim();
      const odt = qParam("odt") || String(odtPlantilla || "").trim();
      const cliente = qParam("cliente") || String(clientePlantilla || "").trim();

      document.getElementById("tecnico").value = tecnico;
      document.getElementById("odt").value = odt;
      document.getElementById("cliente").value = cliente;

      if (!tecnico || !odt || !cliente) {
        setError("Faltan parametros para abrir el formulario (tecnico, odt, cliente).");
        const form = document.getElementById("gastoForm");
        if (form) form.style.display = "none";
        return false;
      }
      return true;
    }

    function htmlResumen(data, resultado) {
      const monto = Number(data.montoTotal || 0);
      const montoTxt = Number.isFinite(monto)
        ? monto.toLocaleString("es-CL", { style: "currency", currency: "CLP", maximumFractionDigits: 0 })
        : String(data.montoTotal || "");
      return `
        <p><b>Folio:</b> ${resultado?.folio ?? ""}</p>
        <p><b>Codigo Diario:</b> ${resultado?.codigoDiario ?? ""}</p>
        <p><b>Tecnico:</b> ${data.tecnico}</p>
        <p><b>ODT:</b> ${data.odt}</p>
        <p><b>Cliente:</b> ${data.cliente}</p>
        <p><b>Tipo de Gasto:</b> ${data.tipoGasto}</p>
        <p><b>Tipo de Documento:</b> ${data.tipoDocumento}</p>
        <p><b>Fecha Documento:</b> ${data.fechaDocumento}</p>
        <p><b>Nro Documento:</b> ${data.nroDocumento}</p>
        <p><b>Monto:</b> ${montoTxt}</p>
        <p><b>Descripcion:</b> ${data.descripcion || "-"}</p>
      `;
    }

    async function enviarFormulario(e) {
      e.preventDefault();
      if (envioRealizado) return;
      setError("");
      setOk("");

      const tecnico = String(document.getElementById("tecnico").value || "").trim();
      const odt = String(document.getElementById("odt").value || "").trim().toUpperCase();
      const cliente = String(document.getElementById("cliente").value || "").trim();
      const tipo = String(tipoGasto.value || "").trim();
      const tipoDoc = String(tipoDocumento.value || "").trim();
      const fechaStr = String(document.getElementById("fechaDocumento").value || "").trim();
      const nro = String(nroDocumento.value || "").trim();
      const monto = Number(document.getElementById("montoTotal").value);
      const descripcion = String(document.getElementById("descripcion").value || "").trim();
      const archivo = document.getElementById("boleta").files?.[0];

      if (!tecnico || !odt || !cliente || !tipo || !tipoDoc || !fechaStr || !nro || !Number.isFinite(monto) || monto <= 0) {
        setError("Completa todos los campos obligatorios.");
        return;
      }
      if (!archivo) {
        setError("Debes adjuntar una imagen del documento.");
        return;
      }

      const fechaDoc = new Date(fechaStr);
      const ahora = new Date();
      if (Number.isNaN(fechaDoc.getTime())) {
        setError("Selecciona una fecha valida.");
        return;
      }
      if (fechaDoc.getTime() > ahora.getTime()) {
        setError("La fecha del documento no puede ser futura.");
        return;
      }

      const aplica24h = odt.startsWith("I") || odt.startsWith("M");
      if (aplica24h) {
        const ms24h = 24 * 60 * 60 * 1000;
        if ((ahora.getTime() - fechaDoc.getTime()) > ms24h) {
          setError("Para ODT I/M, la fecha del documento debe estar dentro de las ultimas 24 horas.");
          return;
        }
      }

      bloquearFormulario();
      try {
        const duplicado = await verificarDuplicado(nro);
        if (duplicado) {
          setError("El Nro de Documento ya fue registrado.");
          desbloquearFormulario();
          return;
        }

        const urlBoleta = await subirBoleta(archivo, tecnico, odt);
        if (!urlBoleta) {
          throw new Error("No se obtuvo URL de boleta.");
        }

        const payload = {
          tecnico,
          odt,
          cliente,
          tipoGasto: tipo,
          tipoDocumento: tipoDoc,
          fechaDocumento: fechaStr,
          nroDocumento: nro,
          montoTotal: monto,
          descripcion,
          urlBoleta,
        };

        const resultado = await api("/api/rendiciones", {
          method: "POST",
          body: JSON.stringify(payload),
        });

        const form = document.getElementById("gastoForm");
        if (form) form.style.display = "none";
        const resumen = document.getElementById("resumenEnviado");
        const detalle = document.getElementById("detalleEnviado");
        if (detalle) detalle.innerHTML = htmlResumen(payload, resultado);
        if (resumen) resumen.style.display = "block";
        setOk("Rendicion enviada correctamente.");
      } catch (err) {
        setError(`No se pudo registrar la rendicion: ${err.message}`);
        desbloquearFormulario();
      }
    }

    window.addEventListener("load", async () => {
      const sesionOk = await validarSesionActiva();
      if (!sesionOk) return;
      fechaDocumento = document.getElementById("fechaDocumento");
      bindPeajeAutoNumero();
      tipoGasto.addEventListener("change", actualizarTipoDocumento);
      document.getElementById("gastoForm").addEventListener("submit", enviarFormulario);
      poblarCamposIniciales();
    });
  </script>
</body>
</html>
