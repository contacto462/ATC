<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ST Ventas</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #0f2f43 0%, #081824 55%, #030a11 100%);
      color: #e9f4ff;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      width: min(680px, 100%);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 18px;
      background: rgba(8, 20, 30, 0.86);
      backdrop-filter: blur(10px);
      padding: 28px;
      box-sizing: border-box;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.15;
    }
    p {
      margin: 0;
      color: #c8d9e9;
      line-height: 1.5;
      font-size: 16px;
    }
    .actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      text-decoration: none;
      border: 1px solid rgba(255,255,255,.20);
      color: #e9f4ff;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,.04);
      font-weight: 600;
    }
    .btn:hover { filter: brightness(1.08); }
  </style>
</head>
<body>
  <div class="card">
    <h1>ST Ventas</h1>
    <p>Este modulo esta reservado para el nuevo flujo de ST Ventas. Puedes volver al panel de Servicio Tecnico mientras se implementa el contenido final.</p>
    <div class="actions">
      <a class="btn" href="/?form=panelSelectorServicio&token={{ token|default('') }}">Volver al panel</a>
      <a class="btn" href="/?form=login&next=servicioTecnico">Cambiar sesion</a>
    </div>
  </div>
</body>
</html>
