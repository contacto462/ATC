<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Iniciar sesión</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* =========================================================
   HELP DESK PRO — AUTH (ENTERPRISE LOGIN EXPERIENCE)
   ========================================================= */

:root{
  --bg:#0b1220;
  --bg-2:#0f172a;

  --surface:rgba(255,255,255,.06);
  --surface-strong:rgba(255,255,255,.10);

  --border:rgba(255,255,255,.12);
  --border-strong:rgba(255,255,255,.18);

  --text:#e7ecf5;
  --muted:#94a3b8;

  --primary:#2563eb;
  --primary-2:#1d4ed8;
  --primary-soft:rgba(37,99,235,.18);

  --danger:#f87171;
  --danger-soft:rgba(248,113,113,.15);

  --shadow:0 30px 60px rgba(0,0,0,.45);
  --radius:18px;
}

/* ================= BASE ================= */

*{ box-sizing:border-box; }

html,body{
  height:100%;
}

body{
  margin:0;
  font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:
    radial-gradient(900px 400px at 20% -10%, rgba(37,99,235,.25), transparent 60%),
    radial-gradient(800px 500px at 90% 10%, rgba(99,102,241,.18), transparent 60%),
    linear-gradient(180deg,var(--bg),var(--bg-2));
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

/* ================= CARD ================= */

.card{
  width:100%;
  max-width:400px;
  padding:36px 32px 30px;
  border-radius:var(--radius);
  background:var(--surface);
  backdrop-filter:blur(16px);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  position:relative;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(37,99,235,.15),transparent 40%);
  pointer-events:none;
}

/* ================= HEADER ================= */

.brand{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:28px;
}

.logo-img{
  width:72px;
  height:72px;
  padding:8px;
  border-radius:16px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(8px);
  display:flex;
  align-items:center;
  justify-content:center;
}
.brand-text{
  display:flex;
  flex-direction:column;
  line-height:1.2;
}

.brand-text strong{
  font-size:15px;
  font-weight:800;
  letter-spacing:.3px;
}

.brand-text span{
  font-size:12px;
  color:var(--muted);
}

/* ================= FORM ================= */

h1{
  margin:0 0 22px;
  font-size:20px;
  font-weight:800;
  letter-spacing:.3px;
}

.field{
  margin-bottom:18px;
}

label{
  display:block;
  font-size:12px;
  font-weight:600;
  color:var(--muted);
  margin-bottom:6px;
}

input{
  width:100%;
  height:42px;
  padding:0 14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.05);
  color:var(--text);
  font-family:inherit;
  font-size:14px;
  transition:.2s;
}

input::placeholder{
  color:rgba(148,163,184,.6);
}

input:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 4px var(--primary-soft);
  background:rgba(255,255,255,.08);
}

/* ================= BUTTON ================= */

button{
  width:100%;
  height:44px;
  margin-top:10px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,var(--primary),var(--primary-2));
  color:white;
  font-weight:700;
  font-size:14px;
  letter-spacing:.3px;
  cursor:pointer;
  transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
  box-shadow:0 14px 30px rgba(37,99,235,.35);
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 18px 40px rgba(37,99,235,.45);
  filter:brightness(1.05);
}

button:active{
  transform:translateY(0);
  box-shadow:0 12px 24px rgba(37,99,235,.35);
}

.logo-img{
  width:90px;
  height:90px;
  padding:8px;
  border-radius:16px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(8px);
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo-img img{
  max-width:145%;
  max-height:100%;
  object-fit:contain;
}
/* ================= ERROR ================= */

.err{
  margin-top:14px;
  padding:10px 12px;
  border-radius:12px;
  background:var(--danger-soft);
  border:1px solid rgba(248,113,113,.35);
  color:var(--danger);
  font-size:13px;
  font-weight:600;
}

/* ================= FOOTER ================= */

.footer{
  margin-top:24px;
  text-align:center;
  font-size:12px;
  color:var(--muted);
  opacity:.8;
}

/* ================= RESPONSIVE ================= */

@media (max-width:480px){
  .card{
    padding:28px 22px 24px;
  }
}

@media (prefers-reduced-motion: reduce){
  *{
    transition:none !important;
  }
}
</style>
</head>

<body>

<div class="card">

  <div class="brand">
    <div class="logo-img">
      <img src="/static/img/logo-atc.png" alt="ATC - Alguien Te Cuida">
    </div> 
    <div class="brand-text">
      <strong>Alguien te Cuida</strong>
      <span>Panel de soporte</span>
    </div>
  </div>

  <h1>Iniciar sesión</h1>

  <form method="post" action="/web/login">

    <div class="field">
      <label>Usuario</label>
      <input name="username" autocomplete="username" required />
    </div>

    <div class="field">
      <label>Contraseña</label>
      <input name="password" type="password" autocomplete="current-password" required />
    </div>

    <button type="submit">Ingresar</button>

    {% if error %}
      <div class="err">{{ error }}</div>
    {% endif %}

  </form>

  <div class="footer">
    © {{ 2026 }} HelpDesk ATC — Plataforma de gestión de tickets
  </div>

</div>

</body>
</html>
